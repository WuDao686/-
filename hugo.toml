baseURL = "https://lctnb.top/"
locale = "zh-cn"
title = "雾之岛"

theme = "hugo-theme-reimu-main"

[markup.highlight]
  guessSyntax = true
  noClasses = false

[markup.goldmark.extensions.passthrough]
  enable = true
  delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
  delimiters.inline = [["\\(", "\\)"], ["$", "$"]]

[imaging]
  quality = 85
  resampleFilter = "Lanczos"
  anchor = "Smart"

[params]
  icon_font = "5204243"
  avatar = "favicon.ico"
  author = "雾岛"
  description = "一个在迷雾中拨开的网站"
  subtitle = "一个在迷雾中拨开的网站"
  share = ["weixin", "qq"]

  [params.footer]
    powered = false
    count = false
    busuanzi = false
    [params.footer.icon]
      url = false

  [params.icp]
    icpnumber = "闽ICP备2025121748号"
    beian = "闽公网安备35082202820160号"
    recordcode = "35082202820160"

  [params.top]
    enable = true
    [params.top.icon]
      url = "../favicon.ico"
      rotate = true
      mask = false

  [[params.menu]]
    name = "home"
    url = ""
    icon = "e762"
  [[params.menu]]
    name = "about"
    url = "about"
    icon = "e8f6"
  [[params.menu]]
    name = "friend"
    url = "friend"
    icon = "e8f8"

  [params.social]
    github = "https://github.com/WuDao686"
    bilibili = "https://space.bilibili.com/507649476"

  [params.preloader]
    enable = true
    [params.preloader.text]
      zh-CN = "迷雾散开中..."
      en = "Loading..."

[params.giscus]
    enable = true
    repo = "WuDao686/-"
    repoId = "R_kgDOTXo2DA"
    category = "Announcements"
    categoryId = "DIC_kwDOTXo2DM4DBPt-"
    mapping = "pathname"
    strict = "pathname"
    reactionsEnabled = 1
    inputPosition = "top"

[params.article_copyright]
  enable = true
  [params.article_copyright.content]
    author = true
    link = true
    license = true
    license_type = "by-nc-sa"

[params.outdate]
  enable = true
  daysAgo = 180

[params.firework]
  enable = true
  disable_on_mobile = false

  [params.firework.options]
    excludeElements = ["a", "button"]
    [[params.firework.options.particles]]
      shape = "heart"
      move = ["emit"]
      colors = ["#ffd700", "#ffb800", "#ff9500", "#ffcc00"]
      number = 18
      duration = [1200, 1800]
      shapeOptions = { radius = [12, 28], alpha = [0.4, 0.7] }
    [[params.firework.options.particles]]
      shape = "circle"
      move = ["diffuse"]
      colors = ["#ffd700"]
      number = 1
      duration = [1200, 1800]
      shapeOptions = { radius = 24, alpha = [0.15, 0.4], lineWidth = 4 }

[params.injector]
  head_end = "<meta name=\"referrer\" content=\"no-referrer\"><style>body{background:var(--color-background)}#footer-info > div:not(.footer-beian){display:none}#footer{background:linear-gradient(to top,var(--color-footer-background) 50%,transparent);margin-top:-20px}.share-icon.icon.icon-weixin:before,.share-icon.icon.icon-qq:before{font-family:iconfont!important}.share-icon.icon.icon-weixin:before{content:\"\\e600\"}.share-icon.icon.icon-qq:before{content:\"\\e882\"}.sidebar-social{gap:20px;justify-content:center}#main-nav-toggle:before{content:\"\\e8f5\"!important}#nav-rss-link:before{content:\"\\e601\"!important}#nav-sun-btn:before{content:\"\\e635\"!important}#nav-moon-btn:before{content:\"\\e63e\"!important}#nav-circle-half-stroke-btn:before{content:\"\\e64d\"!important}</style>"
  body_end = "<script>(function(){var o=setupFirework;setupFirework=function(){if(window.firework&&window.firework.registerEntity){window.firework.registerEntity('heart',class extends window.firework.BaseEntity{paint(){var c=this.ctx,r=this.radius;c.beginPath();c.moveTo(0,r*-0.3);c.bezierCurveTo(r*0.5,r*-0.9,r*0.9,r*-0.2,0,r*0.6);c.bezierCurveTo(-r*0.9,r*-0.2,-r*0.5,r*-0.9,0,r*-0.3);c.closePath()}})}o()}})();</script>"
